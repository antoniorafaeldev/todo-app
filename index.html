<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App - Frontend Mentor</title>
  </head>
  <body>
    <main>
      <div class="bg">
        <img
          src="./assets/bg-desktop-dark.jpg"
          alt="Background image for dark theme"
          class="bg-img bg-img--desktop bg-img--dark"
        />
      </div>

      <header class="app-header">
        <h1 class="app-title">Todo</h1>
        <button class="theme-toggle" aria-label="Toggle theme">
          <img src="./assets/icon-sun.svg" alt="Sun icon" />
        </button>
      </header>

      <section class="todo-create">
        <input type="radio" id="add-todo-radio" class="todo-create__toggle" />
        <input
          type="text"
          id="todo-input"
          class="todo-create__input"
          placeholder="Create a new todo..."
        />
      </section>

      <section class="todo-list tasks-container">
        <div class="todo-footer">
          <p id="items-left" class="todo-count">X Items Left</p>
          <button class="btn clear-completed">Clear Completed</button>
        </div>
      </section>

      <section class="filters">
        <nav aria-label="Filtrar tarefas">
          <ul class="filters__list">
            <li class="filters__item">
              <button
                class="filters__btn filters__btn--active"
                aria-pressed="true"
              >
                All
              </button>
            </li>
            <li class="filters__item">
              <button class="filters__btn" aria-pressed="false">Active</button>
            </li>
            <li class="filters__item">
              <button class="filters__btn" aria-pressed="false">
                Completed
              </button>
            </li>
          </ul>
        </nav>
      </section>
    </main>
  </body>
</html>
