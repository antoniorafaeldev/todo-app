<!doctype html>
<html lang="en" >
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App - Frontend Mentor</title>
    <link rel="stylesheet" href="./src/css/style.css" />
  </head>
  <body>
    <div class="bg">
      <img
        src="./assets/bg-desktop-dark.jpg"
        alt="Background image for dark theme"
        class="bg-img bg-img--desktop bg-img--dark"
        id="bg-img"
      />
    </div>
    <main>

      <header class="app-header">
        <h1 class="app-title">Todo</h1>
        <button class="theme-toggle" aria-label="Toggle theme" id="theme-toggle">
          <img src="./assets/icon-sun.svg" alt="Sun icon" id="theme-icon" />
        </button>
      </header>

      <section class="todo-create">
        <label class="todo-checkbox todo-create__checkbox">
          <input type="checkbox" class="todo-checkbox__input" aria-hidden="true" tabindex="-1" />
          <span class="todo-checkbox__box" aria-hidden="true"></span>
        </label>
        <input
          type="text"
          id="todo-input"
          class="todo-create__input"
          placeholder="Create a new todo..."
        />
      </section>

      <section class="todo-list tasks-container">
        
        <div class="task-container">
          <label class="todo-checkbox">
            <input type="checkbox" class="todo-checkbox__input" />
            <span class="todo-checkbox__box" aria-hidden="true"></span>
            <span class="todo-checkbox__label">Teste tarefa</span>
          </label>
        </div>

        <div class="task-container">
          <label class="todo-checkbox">
            <input type="checkbox" class="todo-checkbox__input" />
            <span class="todo-checkbox__box" aria-hidden="true"></span>
            <span class="todo-checkbox__label">Teste tarefa</span>
          </label>
        </div>

        <div class="todo-footer">
          <p id="items-left" class="todo-count">X Items Left</p>
          <button class="btn clear-completed">Clear Completed</button>
        </div>
      </section>

      <section class="filters">
        <nav aria-label="Filtrar tarefas">
          <ul class="filters__list">
            <li class="filters__item">
              <button
                class="filters__btn filters__btn--active"
                aria-pressed="true"
              >
                All
              </button>
            </li>
            <li class="filters__item">
              <button class="filters__btn" aria-pressed="false">Active</button>
            </li>
            <li class="filters__item">
              <button class="filters__btn" aria-pressed="false">
                Completed
              </button>
            </li>
          </ul>
        </nav>
      </section>
    </main>


    <script type="module" src="./src/js/main.js"></script>
  </body>
</html>
